{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Warhammer 40K Archive{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="{% static 'collection/styles.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning">
    <div class="container">
        <a class="navbar-brand text-warning" href="/">Warhammer Collection</a>

        <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/about/">About</a></li>
            <li class="nav-item"><a class="nav-link" href="/minis/">Miniatures</a></li>
            <li class="nav-item"><a class="nav-link text-warning" href="/minis/new/">Add Miniature</a></li>
        </ul>
        </div>
    </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
