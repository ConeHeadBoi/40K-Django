{% extends 'collection/base.html' %}

{% block content %}

<h2 class="mb-4">Add Miniature</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {% for field in form %}
        <div class="mb-3">
            {{ field.label_tag }}
            {{ field }}
            {% if field.errors %}
                <div class="text-danger small">
                    {{ field.errors }}
                </div>
            {% endif %}
        </div>
    {% endfor %}

    <button type="submit" class="btn btn-warning">
        Save Miniature
    </button>
</form>
{% endblock %}
